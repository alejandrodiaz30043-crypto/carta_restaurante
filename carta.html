<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alejandro Diaz" >
    <link rel="stylesheet" href="./estilos.css">
    <title>JuanMapi's - Asadero-Restaurante y Heladria</title>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo Juan Mapi's">
        <h1>JuanMapi's</h1>
        <p>Asadero y Restaurante</p>
    </header>

    <main>

        <!-- 1. Comidas Rápidas -->
        <section id="comidas-rapidas">
            <h2>Comidas Rápidas</h2>
            <img src="./1.png" alt="Comidas Rápidas - Hamburguesas, Perros Calientes y Salchipapas">
        </section>

        <!-- 2. Nuestros Pollos -->
        <section id="pollos">
            <h2>Nuestros Pollos</h2>
            <img src="./2.png" alt="Pollo Broaster y Pollo Frito">
        </section>

        <!-- 3. Platos a la Carta y Sopas -->
        <section id="platos">
            <h2>Platos a la Carta y Sopas</h2>
            <img src="./3.png" alt="Platos a la Carta y Sopas">
        </section>

           <!-- 4. Arroces, Bebidas y Adicionales -->
        <section id="arroces">
            <h2>Arroces, Bebidas y Adicionales</h2>
            <img src="./4.png" alt="Arroces, Bebidas y Adicionales">
        </section>

        <!-- 5. Postres -->
        <section id="postres">
            <h2>Nuestros Postres</h2>
            <img src="./5.png" alt="Postres 1">
            <img src="./6.png" alt="Postres 2">
        </section>

    </main>

    <!-- Botón de WhatsApp -->
    <a href="https://wa.me/573102200339?text=Hola%20Juan%20Mapi's,%20quiero%20hacer%20un%20pedido" 
   class="btn-whatsapp" 
   target="_blank">
   Hacer Pedido por WhatsApp
</a>

    <footer>
     

    <section class="ubicacion">
    <h2>📍 Encuéntranos</h2>
    
    <section class="mapa">
  <a 
     href="https://www.google.com/maps/dir/?api=1&destination=4.710769,-74.137062" 
     target="_blank" 
     class="btn-maps">
     Cómo llegar 📍
     <img src="./yL9Ic.png" alt="mapa">
  </a>
    </section>
</section>

    </footer>
   <p><strong>Juan Mapi's Asadero y Restaurante</strong></p>
        <p>Bogotá, Colombia</p>
        <p>© 2026 Todos los derechos reservados</p>
</body>
</html>
